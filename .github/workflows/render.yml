name: Render Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Composition to render (e.g., AIDevFlow)'
        required: true
        default: 'AIDevFlow'
        type: string
      render_mode:
        description: 'Rendering mode'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - lambda
  push:
    branches: [main]
    paths:
      - 'src/compositions/**'
      - 'src/components/**'
      - 'src/hooks/**'
      - 'src/utils/**'
      - 'src/Root.tsx'
      - 'remotion.config.ts'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        if: inputs.render_mode != 'lambda'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libgl1-mesa-dri libgbm1

      - run: npm ci

      - name: Determine composition
        id: comp
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "id=${{ inputs.composition }}" >> $GITHUB_OUTPUT
          else
            echo "id=AIDevFlow" >> $GITHUB_OUTPUT
          fi

      - name: Render (local)
        if: inputs.render_mode != 'lambda'
        run: |
          mkdir -p out
          xvfb-run --auto-servernum npx remotion render src/index.ts ${{ steps.comp.outputs.id }} out/${{ steps.comp.outputs.id }}.mp4 --codec h264 --gl=swangle

      - name: Render (Lambda)
        if: inputs.render_mode == 'lambda'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          REMOTION_LAMBDA_FUNCTION_NAME: ${{ secrets.REMOTION_LAMBDA_FUNCTION_NAME }}
          REMOTION_LAMBDA_REGION: us-east-1
          REMOTION_LAMBDA_SITE_NAME: explainer-3d
        run: |
          npx tsx src/renderer/render-all.ts --lambda --composition ${{ steps.comp.outputs.id }}

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ steps.comp.outputs.id }}-${{ github.sha }}
          path: out/*.mp4
          retention-days: 30

      - name: Upload to S3
        if: vars.ENABLE_S3_UPLOAD == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          BUCKET="${S3_BUCKET:-htekdev-renders}"
          DATE=$(date +%Y-%m-%d)
          aws s3 cp out/${{ steps.comp.outputs.id }}.mp4 "s3://${BUCKET}/explainer-3d/${{ steps.comp.outputs.id }}-${DATE}.mp4"
